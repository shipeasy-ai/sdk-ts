name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

# Lock to one publish at a time so a rapid double-tag can't race the npm
# version bump and the R2 upload out of order.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # npm Trusted Publishing (OIDC, no token) requires npm >= 11.5.1.
      # Node 22 ships with npm 10.x which falls back to NODE_AUTH_TOKEN.
      # Pinned, not @latest: npm 11.6.x ships without its sigstore dep, so
      # `npm publish --provenance` dies with "Cannot find module 'sigstore'".
      - name: Upgrade npm
        run: npm install -g npm@11.5.2

      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run test
      - run: pnpm run build

      # ----- npm -----
      # Trusted Publishing via OIDC — no token required. Requires a matching
      # Trusted Publisher rule on
      # https://www.npmjs.com/package/@shipeasy/sdk/access (Settings →
      # Trusted Publishers → GitHub Actions, repo shipeasy-ai/sdk-ts, workflow
      # publish.yml).
      #
      # The drop-in <script> loader artifact (R2 upload) is published from the
      # private shipeasy monorepo on submodule bump — keeping CF account id /
      # API token out of this public repo.
      - name: Publish @shipeasy/sdk to npm
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@shipeasy/sdk@$PKG_VERSION" version 2>/dev/null | grep -q "$PKG_VERSION"; then
            echo "Already published: @shipeasy/sdk@$PKG_VERSION"
          else
            npm publish --access public --provenance
          fi
